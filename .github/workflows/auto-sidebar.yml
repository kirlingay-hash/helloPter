name: Auto Update Sidebar

on:
  push:
    branches:
      - main  # 如果你的主分支是 master，请改为 master
    paths:
      - '**.md'  # 只有当 md 文件变化时才触发
      - '!_sidebar.md' # 排除掉 sidebar 自己，防止无限循环

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Sidebar
        run: |
          echo "* [首页](README.md)" > _sidebar.md
          # 扫描所有 .md 文件（排除 README 和 _ 开头的文件）
          find . -maxdepth 2 -name "*.md" ! -name "README.md" ! -name "_*" | sort | while read -r file; do
            # 去掉路径前面的 ./
            clean_file=$(echo "$file" | sed 's|^\./||')
            # 获取文件名作为标题（去掉 .md）
            title=$(basename "$clean_file" .md)
            echo "  * [$title]($clean_file)" >> _sidebar.md
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _sidebar.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto update sidebar" && git push)