name: Auto Update Sidebar

on:
  push:
    branches:
      - main
    paths:
      - '*.md'
      - '**/*.md'
      - '!_sidebar.md'

# 强制该工作流使用 Node.js 24 运行环境，消除过时警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # 建议检查并使用最新版本，通常 v5+ 会原生支持 Node 24
        uses: actions/checkout@v5 

      - name: Generate Sidebar
        run: |
          {
            echo "* **总索引**"
            echo "  * [首页入口](README.md)"
            echo

            current_dir=""
            find . -type f -name "*.md" ! -name "README.md" ! -name "_*" | sort | while read -r file; do
              clean_file=$(echo "$file" | sed 's|^\./||')
              dir=$(dirname "$clean_file")
              title=$(basename "$clean_file" .md)

              if [ "$dir" != "$current_dir" ]; then
                if [ -n "$current_dir" ]; then
                  echo
                fi

                if [ "$dir" = "." ]; then
                  section_title="根目录文档"
                else
                  section_title="$dir"
                fi

                echo "* **$section_title**"
                current_dir="$dir"
              fi

              echo "  * [$title]($clean_file)"
            done
          } > _sidebar.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _sidebar.md
          # 只在 _sidebar.md 真有变化时提交，避免空提交报错
          if git diff --cached --quiet -- _sidebar.md; then
            echo "No sidebar changes to commit"
          else
            git commit -m "docs: auto update sidebar"
            git push
          fi
